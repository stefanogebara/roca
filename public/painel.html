<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Stevi · Painel</title>
  <link rel="icon" href="/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
  <style>
    :root {
      --green: #14432f; --green-2: #1f6b47; --leaf: #2e9e63;
      --cream: #f4efe4; --card: #ffffff; --ink: #1a2420; --muted: #6b7a72;
      --line: #e3dccb; --amber: #b7791f; --red: #b23b3b;
      --shadow: 0 1px 2px rgba(20,40,30,.06), 0 6px 20px rgba(20,40,30,.06);
      --radius: 14px;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; }
    body {
      font-family: 'DM Sans', system-ui, sans-serif;
      color: var(--ink); background: var(--cream);
      -webkit-font-smoothing: antialiased; font-size: 15px; line-height: 1.5;
    }
    .serif { font-family: 'Instrument Serif', Georgia, serif; font-weight: 400; font-synthesis: none; letter-spacing: .2px; }
    .mono { font-family: 'JetBrains Mono', ui-monospace, monospace; }
    a { color: var(--green-2); }

    /* Login */
    #login { min-height: 100dvh; display: grid; place-items: center; padding: 24px; }
    .login-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 40px 36px; width: 100%; max-width: 380px; text-align: center; }
    .brand { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 6px; }
    .brand .mark { width: 34px; height: 34px; border-radius: 9px; background: var(--green); display: grid; place-items: center; color: #efe8; font-size: 18px; }
    .login-card h1 { font-size: 30px; margin: 4px 0 2px; }
    .login-card p { color: var(--muted); margin: 0 0 22px; font-size: 14px; }
    input[type=password], input[type=text] { width: 100%; padding: 12px 14px; border: 1px solid var(--line); border-radius: 10px; font: inherit; background: #fbfaf6; }
    input:focus { outline: 2px solid var(--leaf); border-color: transparent; }
    button { font: inherit; cursor: pointer; }
    .btn { background: var(--green); color: #fff; border: none; border-radius: 10px; padding: 12px 16px; font-weight: 600; width: 100%; margin-top: 12px; }
    .btn:hover { background: var(--green-2); }
    .btn.small { width: auto; padding: 7px 12px; font-size: 13px; margin: 0; }
    .btn.ghost { background: transparent; color: var(--green-2); border: 1px solid var(--line); }
    .err { color: var(--red); font-size: 13px; margin-top: 10px; min-height: 16px; }

    /* App shell */
    #app { display: none; max-width: 1080px; margin: 0 auto; padding: 0 20px 60px; }
    header.top { display: flex; align-items: center; justify-content: space-between; padding: 22px 2px 14px; }
    header.top .brand h1 { font-size: 26px; margin: 0; }
    header.top .brand { justify-content: flex-start; }
    .tabs { display: flex; gap: 4px; flex-wrap: wrap; border-bottom: 1px solid var(--line); margin-bottom: 22px; }
    .tab { background: none; border: none; padding: 10px 14px; color: var(--muted); font-weight: 500; border-bottom: 2px solid transparent; margin-bottom: -1px; }
    .tab.active { color: var(--green); border-bottom-color: var(--leaf); }
    .tab .em-breve { font-size: 10px; background: var(--line); color: var(--muted); border-radius: 6px; padding: 1px 5px; margin-left: 5px; vertical-align: middle; }

    .panel { display: none; }
    .panel.active { display: block; }

    /* Stat cards */
    .stats { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 12px; margin-bottom: 22px; }
    .stat { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); padding: 16px; box-shadow: var(--shadow); }
    .stat .n { font-family: 'Instrument Serif', serif; font-size: 34px; line-height: 1; color: var(--green); }
    .stat .n.warn { color: var(--amber); } .stat .n.bad { color: var(--red); }
    .stat .l { color: var(--muted); font-size: 12.5px; margin-top: 6px; text-transform: uppercase; letter-spacing: .5px; }

    .card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 18px; margin-bottom: 16px; }
    .card h3 { margin: 0 0 12px; font-size: 15px; }
    .bars .bar { display: grid; grid-template-columns: 130px 1fr 40px; align-items: center; gap: 10px; margin: 6px 0; font-size: 13px; }
    .bars .track { background: #eef2ee; border-radius: 6px; height: 10px; overflow: hidden; }
    .bars .fill { background: var(--leaf); height: 100%; }
    .bars .v { text-align: right; color: var(--muted); }

    /* Conversation list */
    .conv { display: grid; grid-template-columns: 1fr auto; gap: 8px; padding: 12px 14px; border: 1px solid var(--line); border-radius: 12px; background: var(--card); margin-bottom: 8px; cursor: pointer; box-shadow: var(--shadow); }
    .conv:hover { border-color: var(--leaf); }
    .conv .who { font-weight: 600; }
    .conv .meta { color: var(--muted); font-size: 12.5px; margin-top: 2px; }
    .conv .right { text-align: right; color: var(--muted); font-size: 12px; white-space: nowrap; }
    .pill { display: inline-block; background: #eef4ef; color: var(--green-2); border-radius: 20px; padding: 1px 9px; font-size: 11.5px; margin-right: 4px; }

    /* Prospecção */
    .funnel { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 10px; margin-bottom: 14px; }
    .fstage { position: relative; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); box-shadow: var(--shadow); padding: 12px 14px; cursor: pointer; text-align: left; transition: transform .12s ease, border-color .12s ease; font: inherit; }
    .fstage:hover { transform: translateY(-1px); border-color: var(--leaf); }
    .fstage.on { border-color: var(--green-2); outline: 2px solid var(--leaf); }
    .fstage .n { font-family: 'Instrument Serif', serif; font-size: 30px; line-height: 1; color: var(--green); }
    .fstage .l { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-top: 5px; }
    .fstage .dot { position: absolute; top: 12px; right: 12px; width: 9px; height: 9px; border-radius: 50%; }
    .fstage .arr { position: absolute; right: -9px; top: 50%; transform: translateY(-50%); color: var(--line); font-size: 13px; z-index: 1; }
    .toolbar { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-bottom: 12px; }
    .toolbar input[type=text] { flex: 1; min-width: 170px; padding: 9px 12px; }
    .chip { border: 1px solid var(--line); background: var(--card); color: var(--muted); border-radius: 20px; padding: 5px 12px; font-size: 12.5px; cursor: pointer; }
    .chip.on { background: var(--green); border-color: var(--green); color: #fff; }
    .spill { display: inline-block; font-size: 11px; font-weight: 700; border-radius: 20px; padding: 2px 9px; color: #fff; }
    .pcard { border-left: 4px solid transparent; }
    .pcard .who { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .pcard .quali { font-size: 12.5px; color: var(--green-2); margin-top: 4px; }
    .pcard .act { display: flex; gap: 6px; align-items: center; justify-content: flex-end; flex-wrap: wrap; }
    .btn.tiny { width: auto; padding: 5px 10px; font-size: 12px; margin: 0; border-radius: 8px; }
    .btn.danger { background: transparent; color: var(--red); border: 1px solid var(--line); }
    .btn.danger:hover { background: #fbeeee; }
    .prospect-thread { animation: slidein .18s ease; }
    @keyframes slidein { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
    details.imp summary { cursor: pointer; color: var(--green-2); font-weight: 600; font-size: 14px; }
    .countnote { color: var(--muted); font-size: 13px; margin: 2px 0 12px; }

    /* Thread */
    .thread { display: flex; flex-direction: column; gap: 8px; }
    .msg { max-width: 78%; padding: 9px 12px; border-radius: 14px; font-size: 14px; white-space: pre-wrap; word-break: break-word; }
    .msg.in { align-self: flex-start; background: #fff; border: 1px solid var(--line); border-bottom-left-radius: 4px; }
    .msg.out { align-self: flex-end; background: #dcf3e3; border-bottom-right-radius: 4px; }
    .msg .tag { display: block; font-size: 10.5px; color: var(--muted); margin-top: 4px; }
    .backlink { background: none; border: none; color: var(--green-2); padding: 0 0 12px; font-weight: 600; }

    /* Style packs */
    .pack { border: 1px solid var(--line); border-radius: 12px; background: var(--card); padding: 14px 16px; margin-bottom: 10px; box-shadow: var(--shadow); }
    .pack .hd { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
    .badge { font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 20px; }
    .badge.on { background: var(--leaf); color: #fff; } .badge.off { background: #eef2ee; color: var(--muted); }
    .pack .notes { color: var(--muted); font-size: 13px; margin: 6px 0 0; }
    .pack pre { background: #faf8f2; border: 1px solid var(--line); border-radius: 10px; padding: 12px; overflow: auto; font-size: 12.5px; max-height: 320px; white-space: pre-wrap; }

    .digest pre { background: #faf8f2; border: 1px solid var(--line); border-radius: 10px; padding: 14px; white-space: pre-wrap; font-family: inherit; font-size: 13.5px; }
    .digest .when { color: var(--muted); font-size: 12px; margin-bottom: 6px; }
    .empty { color: var(--muted); text-align: center; padding: 40px 0; }
    .loading { color: var(--muted); padding: 20px 0; }
    .soon { text-align: center; padding: 48px 20px; color: var(--muted); }
    .soon .serif { font-size: 26px; color: var(--green); display: block; margin-bottom: 8px; }
  </style>
</head>
<body>
  <!-- LOGIN -->
  <div id="login">
    <form class="login-card" id="loginForm">
      <div class="brand"><span class="mark">🌱</span><span class="serif" style="font-size:30px;color:var(--green)">Stevi</span></div>
      <h1 class="serif">Painel</h1>
      <p>Área dos fundadores · Stefano &amp; Vitoria</p>
      <input type="password" id="pw" placeholder="Senha" autocomplete="current-password" autofocus />
      <button class="btn" type="submit">Entrar</button>
      <div class="err" id="loginErr"></div>
    </form>
  </div>

  <!-- APP -->
  <div id="app">
    <header class="top">
      <div class="brand"><span class="mark" style="width:30px;height:30px;font-size:16px">🌱</span><h1 class="serif" style="color:var(--green)">Stevi · Painel</h1></div>
      <button class="btn ghost small" id="logout">Sair</button>
    </header>
    <nav class="tabs" id="tabs">
      <button class="tab active" data-tab="overview">Visão geral</button>
      <button class="tab" data-tab="conversas">Conversas</button>
      <button class="tab" data-tab="leads">Leads</button>
      <button class="tab" data-tab="prospeccao">Prospecção</button>
      <button class="tab" data-tab="voz">Voz</button>
      <button class="tab" data-tab="digests">Resumos</button>
      <button class="tab" data-tab="gym">Treino</button>
    </nav>

    <section class="panel active" id="p-overview"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-conversas"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-leads"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-prospeccao"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-voz"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-digests"><div class="loading">Carregando…</div></section>
    <section class="panel" id="p-gym"><div class="loading">Carregando…</div></section>
  </div>

  <script>
    const $ = (s, r=document) => r.querySelector(s);
    const el = (t, cls, txt) => { const e = document.createElement(t); if (cls) e.className = cls; if (txt != null) e.textContent = txt; return e; };
    const api = async (path, opts={}) => {
      const r = await fetch('/api/ops/' + path, { credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, ...opts });
      if (r.status === 401) { showLogin(); throw new Error('unauthorized'); }
      const j = await r.json();
      if (!j.success) throw new Error(j.error || 'erro');
      return j.data;
    };
    const fmtDate = (s) => { if (!s) return '—'; const d = new Date(s); return d.toLocaleString('pt-BR', { day:'2-digit', month:'2-digit', hour:'2-digit', minute:'2-digit' }); };

    function showLogin() { $('#app').style.display = 'none'; $('#login').style.display = 'grid'; }
    function showApp() { $('#login').style.display = 'none'; $('#app').style.display = 'block'; loadTab('overview'); }

    $('#loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      $('#loginErr').textContent = '';
      try {
        const r = await fetch('/api/ops/login', { method: 'POST', credentials: 'same-origin', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ password: $('#pw').value }) });
        const j = await r.json();
        if (j.success) { $('#pw').value=''; showApp(); }
        else $('#loginErr').textContent = j.error || 'senha incorreta';
      } catch { $('#loginErr').textContent = 'erro de conexão'; }
    });
    $('#logout').addEventListener('click', async () => {
      // The cookie is HttpOnly — only the server can expire it.
      try { await fetch('/api/ops/logout', { method: 'POST', credentials: 'same-origin' }); } catch { /* show login anyway; the session still dies at TTL */ }
      showLogin();
    });

    const loaded = {};
    $('#tabs').addEventListener('click', (e) => {
      const b = e.target.closest('.tab'); if (!b) return;
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t === b));
      document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
      $('#p-' + b.dataset.tab).classList.add('active');
      loadTab(b.dataset.tab);
    });

    function activateTab(name) {
      document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
      document.querySelectorAll('.panel').forEach(pp => pp.classList.toggle('active', pp.id === 'p-' + name));
    }

    function loadTab(tab) {
      if (tab === 'overview') return loadOverview();
      if (tab === 'conversas') return loadConversas();
      if (tab === 'leads') return loadLeads();
      if (tab === 'prospeccao') return loadProspeccao();
      if (tab === 'voz') return loadVoz();
      if (tab === 'digests') return loadDigests();
      if (tab === 'gym') return loadGym();
    }

    // "O que fazer hoje" — the work queue for a non-technical founder. Built
    // from the same endpoints the tabs use; each card jumps to the right tab.
    async function todayStrip() {
      const wrap = el('div', 'card');
      wrap.append(el('h3', null, '☀️ O que fazer hoje'));
      const row = el('div', 'funnel');
      wrap.append(row);
      try {
        const [leads, prospects] = await Promise.all([api('leads'), api('prospects')]);
        const newLeads = leads.filter(l => (l.status || 'novo') === 'novo').length;
        const repliedP = prospects.filter(x => x.status === 'replied').length;
        const agentOff = prospects.filter(x => x.status === 'replied' && x.agent_enabled === false).length;
        const queue = prospects.filter(x => x.status === 'ready' && x.send_status !== 'sent').length;
        const items = [
          { n: newLeads, l: 'leads pra encaminhar', hint: 'Produtores pedindo agrônomo — entregue ao parceiro e marque "Encaminhado".', tab: 'leads', urgent: newLeads > 0 },
          { n: repliedP, l: 'prospects em conversa', hint: agentOff ? agentOff + ' com agente desligado — responda você!' : 'A Vitória 🤖 cuida; entre só se ela escalar.', tab: 'prospeccao', urgent: agentOff > 0 },
          { n: queue, l: 'na fila de disparo', hint: 'Saem sozinhos: seg–sex 10h/13h/16h, 20 por dia. Fila baixa? Clique em Buscar na web.', tab: 'prospeccao', urgent: queue < 8 },
        ];
        for (const it of items) {
          const b = el('button', 'fstage');
          const n = el('div', 'n', String(it.n));
          if (it.urgent) n.style.color = 'var(--amber)';
          b.append(n, el('div', 'l', it.l));
          b.title = it.hint;
          b.addEventListener('click', () => { activateTab(it.tab); loadTab(it.tab); });
          row.append(b);
        }
        wrap.append(el('div', 'countnote', newLeads === 0 && agentOff === 0 ? '✅ Nada urgente — a operação está rodando sozinha.' : '⚠️ Tem coisa esperando você — clique no card laranja.'));
      } catch { row.append(el('div', 'empty', '—')); }
      return wrap;
    }

    async function loadOverview() {
      const p = $('#p-overview');
      try {
        const d = await api('overview');
        p.innerHTML = '';
        p.append(await todayStrip());
        const stats = el('div', 'stats');
        const cards = [
          ['Produtores', d.users], ['Novos (7d)', d.newUsers7d],
          ['Msgs recebidas', d.inbound], ['Msgs enviadas', d.outbound],
          ['Recebidas (7d)', d.inbound7d], ['Pedidos de agrônomo', d.referrals],
          ['Falhas (7d)', d.failures7d, d.failures7d>0?'warn':''], ['Voz ativa', d.activePack!=null?('v'+d.activePack):'—'],
        ];
        for (const [l, n, cls] of cards) {
          const c = el('div', 'stat');
          c.append(el('div', 'n ' + (cls||''), String(n)), el('div', 'l', l));
          stats.append(c);
        }
        p.append(stats);
        const intents = Object.entries(d.byIntent||{}).sort((a,b)=>b[1]-a[1]);
        const card = el('div', 'card'); card.append(el('h3', null, 'Intenções (últimos 7 dias)'));
        if (!intents.length) card.append(el('div', 'empty', 'Sem tráfego nos últimos 7 dias.'));
        else {
          const max = intents[0][1]; const bars = el('div', 'bars');
          for (const [k, v] of intents) {
            const row = el('div', 'bar'); const track = el('div', 'track'); const fill = el('div', 'fill');
            fill.style.width = Math.round(v/max*100) + '%'; track.append(fill);
            row.append(el('span', 'mono', k), track, el('span', 'v', String(v))); bars.append(row);
          }
          card.append(bars);
        }
        p.append(card);
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    async function loadConversas() {
      const p = $('#p-conversas'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const rows = await api('conversations');
        p.innerHTML = '';
        p.append(el('div', 'countnote', 'Produtores conversando com a Stevi no WhatsApp. Clique num card pra ler a conversa inteira.'));
        if (!rows.length) { p.innerHTML = '<div class="empty">Nenhuma conversa ainda.</div>'; return; }
        for (const c of rows) {
          const item = el('div', 'conv');
          const left = el('div');
          left.append(el('div', 'who', (c.name ? c.name + ' · ' : '') + c.phone));
          const meta = el('div', 'meta');
          if (c.uf) meta.append(Object.assign(el('span','pill'), {textContent: c.uf}));
          (c.crop||[]).forEach(cr => meta.append(Object.assign(el('span','pill'), {textContent: cr})));
          meta.append(document.createTextNode(c.messages + ' msgs'));
          left.append(meta);
          const right = el('div', 'right', fmtDate(c.lastAt));
          item.append(left, right);
          item.addEventListener('click', () => openThread(c));
          p.append(item);
        }
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    async function openThread(c) {
      const p = $('#p-conversas'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const msgs = await api('conversations?userId=' + encodeURIComponent(c.userId));
        p.innerHTML = '';
        const back = el('button', 'backlink', '← Voltar'); back.addEventListener('click', loadConversas); p.append(back);
        p.append(el('h3', null, (c.name ? c.name + ' · ' : '') + c.phone));
        const thread = el('div', 'thread');
        for (const m of msgs) {
          const b = el('div', 'msg ' + (m.direction === 'in' ? 'in' : 'out'), m.text || '('+m.kind+')');
          b.append(el('span', 'tag', [m.kind, m.intent, fmtDate(m.at)].filter(Boolean).join(' · ')));
          thread.append(b);
        }
        p.append(thread);
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    // ── Leads (pedidos de agrônomo) ────────────────────────────────────────
    const L_STATUS = {
      novo:      { label: 'Novos', pill: 'novo', color: '#b7791f', hint: 'produtor pediu agrônomo — encaminhar pro parceiro' },
      contatado: { label: 'Encaminhados', pill: 'encaminhado', color: '#3b6fb2', hint: 'lead entregue ao parceiro — aguardando fechamento' },
      fechado:   { label: 'Fechados', pill: 'fechado', color: '#2e9e63', hint: 'atendido pelo parceiro 🎉' },
    };
    const lState = { status: null };
    let lCache = [];

    async function loadLeads() {
      const p = $('#p-leads'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        lCache = await api('leads');
        p.innerHTML = '';
        const funnel = el('div', 'funnel'); funnel.id = 'l-funnel';
        p.append(funnel);
        p.append(el('div', 'countnote', 'Cada lead é um produtor que pediu receituário/agrônomo. Clique no card pra abrir a conversa completa dele.'));
        const listWrap = el('div'); listWrap.id = 'lead-list';
        p.append(listWrap);
        renderLeads();
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    function renderLeads() {
      const funnel = $('#l-funnel'); if (!funnel) return;
      funnel.innerHTML = '';
      const stages = Object.keys(L_STATUS);
      stages.forEach((s, i) => {
        const st = L_STATUS[s];
        const n = lCache.filter(x => (x.status || 'novo') === s).length;
        const b = el('button', 'fstage' + (lState.status === s ? ' on' : ''));
        b.title = st.hint;
        b.append(el('div', 'n', String(n)), el('div', 'l', st.label));
        const dot = el('span', 'dot'); dot.style.background = st.color; b.append(dot);
        if (i < stages.length - 1) b.append(el('span', 'arr', '›'));
        b.addEventListener('click', () => { lState.status = lState.status === s ? null : s; renderLeads(); });
        funnel.append(b);
      });

      const wrap = $('#lead-list'); if (!wrap) return;
      wrap.innerHTML = '';
      const order = { novo: 0, contatado: 1, fechado: 2 };
      let rows = [...lCache].sort((a, b) =>
        (order[a.status || 'novo'] ?? 9) - (order[b.status || 'novo'] ?? 9) ||
        String(b.at || '').localeCompare(String(a.at || '')));
      if (lState.status) rows = rows.filter(x => (x.status || 'novo') === lState.status);
      if (!rows.length) {
        wrap.append(el('div', 'empty', lCache.length ? 'Nada aqui com esse filtro.' : 'Nenhum pedido de agrônomo ainda — eles aparecem aqui na hora.'));
        return;
      }
      for (const l of rows) wrap.append(leadRow(l));
    }

    function leadRow(l) {
      const s = l.status || 'novo';
      const st = L_STATUS[s] || L_STATUS.novo;
      const item = el('div', 'conv pcard');
      item.style.borderLeftColor = st.color;

      const left = el('div');
      const who = el('div', 'who');
      who.append(el('span', null, l.phone));
      const spill = el('span', 'spill', st.pill); spill.style.background = st.color;
      who.append(spill);
      left.append(who);
      const meta = el('div', 'meta');
      if (l.uf) meta.append(Object.assign(el('span','pill'), {textContent: l.uf}));
      (l.crop||[]).forEach(cr => meta.append(Object.assign(el('span','pill'), {textContent: cr})));
      meta.append(document.createTextNode(fmtDate(l.at)));
      left.append(meta);
      if (l.topic) left.append(el('div', 'quali', '“' + l.topic + '”'));

      const right = el('div', 'act');
      const setStatus = async (status, btn) => {
        btn.disabled = true;
        try {
          await api('leads', { method: 'POST', body: JSON.stringify({ id: l.id, status }) });
          l.status = status; renderLeads();
        } catch (e) { if (e.message!=='unauthorized') alert('Não deu pra salvar o status.'); btn.disabled = false; }
      };
      if (s === 'novo') {
        const fwd = el('button', 'btn tiny', '→ Encaminhado');
        fwd.title = 'Marquei que entreguei esse lead a um parceiro';
        fwd.addEventListener('click', (e) => { e.stopPropagation(); setStatus('contatado', fwd); });
        right.append(fwd);
      } else if (s === 'contatado') {
        const done = el('button', 'btn tiny', '✓ Fechado');
        done.addEventListener('click', (e) => { e.stopPropagation(); setStatus('fechado', done); });
        const back = el('button', 'btn tiny ghost', '↩');
        back.title = 'Voltar pra novo';
        back.addEventListener('click', (e) => { e.stopPropagation(); setStatus('novo', back); });
        right.append(done, back);
      } else {
        const back = el('button', 'btn tiny ghost', '↩ Reabrir');
        back.addEventListener('click', (e) => { e.stopPropagation(); setStatus('contatado', back); });
        right.append(back);
      }

      item.append(left, right);
      if (l.userId) {
        item.style.cursor = 'pointer';
        item.addEventListener('click', () => { activateTab('conversas'); openThread({ userId: l.userId, phone: l.phone, name: null }); });
      }
      return item;
    }

    // ── Prospecção ──────────────────────────────────────────────────────────
    // Status model: discovered → ready → contacted → replied (+ discarded).
    const P_STATUS = {
      discovered: { label: 'Descobertos', pill: 'descoberto', color: '#b7791f', hint: 'achados na web ou importados — revise e aprove' },
      ready:      { label: 'Aprovados', pill: 'aprovado', color: '#2e9e63', hint: 'na fila do disparo automático (seg–sex 10h/13h/16h)' },
      contacted:  { label: 'Contatados', pill: 'contatado', color: '#3b6fb2', hint: 'template enviado — aguardando resposta' },
      replied:    { label: 'Responderam', pill: 'respondeu', color: '#14432f', hint: 'em conversa com a Vitória 🤖' },
      discarded:  { label: 'Descartados', pill: 'descartado', color: '#9aa5a0', hint: 'fora do perfil' },
    };
    const pState = { status: null, kind: null, q: '' };
    let pCache = [];

    // Effective stage: send_status 'sent' shows as contacted even if the row
    // status hasn't caught up yet.
    const pStage = (pr) => (pr.status === 'ready' && pr.send_status === 'sent') ? 'contacted' : pr.status;

    async function loadProspeccao() {
      const p = $('#p-prospeccao'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        pCache = await api('prospects');
        p.innerHTML = '';

        // Funnel — clickable stages that filter the list below.
        const funnel = el('div', 'funnel'); funnel.id = 'p-funnel';
        p.append(funnel);

        // Toolbar: search + kind chips + actions.
        const bar = el('div', 'toolbar');
        const q = el('input'); q.type = 'text'; q.placeholder = '🔎 Buscar por nome, cidade…';
        q.addEventListener('input', () => { pState.q = q.value.trim().toLowerCase(); renderProspects(); });
        bar.append(q);
        for (const k of ['consultoria', 'revenda', 'cooperativa', 'agronomo', 'fazenda']) {
          const c = el('button', 'chip', k);
          c.addEventListener('click', () => {
            pState.kind = pState.kind === k ? null : k;
            bar.querySelectorAll('.chip').forEach(x => x.classList.toggle('on', x.textContent === pState.kind));
            renderProspects();
          });
          bar.append(c);
        }
        p.append(bar);

        // Actions row: sourcing + dispatch (the cron does this alone on weekdays;
        // these buttons exist for "now" moments).
        const act = el('div', 'toolbar');
        const srcBtn = el('button', 'btn small ghost', '🌐 Buscar na web');
        srcBtn.addEventListener('click', async () => {
          srcBtn.disabled = true; srcBtn.textContent = 'Buscando…';
          try {
            const rep = await api('prospects', { method:'POST', body: JSON.stringify({ action:'source' }) });
            note.textContent = rep.configured
              ? `Busca: ${rep.found} encontrados · ${rep.imported} novos importados (${rep.withPhone} com telefone).` + (rep.error ? ` Aviso: ${rep.error}` : '')
              : rep.error;
            await refreshProspects();
          } catch (e) { if (e.message!=='unauthorized') note.textContent = 'Erro na busca: '+e.message; }
          finally { srcBtn.disabled = false; srcBtn.textContent = '🌐 Buscar na web'; }
        });
        const simBtn = el('button', 'btn small ghost', '👁 Simular lote');
        const goBtn = el('button', 'btn small', '📤 Disparar agora');
        const runDispatch = async (dryRun) => {
          if (!dryRun && !confirm('Enviar o template de parceria pro próximo lote de aprovados agora? (respeita opt-out, 20/dia e horário comercial)')) return;
          note.textContent = 'Processando…';
          try {
            const rep = await api('prospects', { method:'POST', body: JSON.stringify({ action:'dispatch', dryRun }) });
            if (rep.skippedOutsideHours) note.textContent = 'Fora do horário comercial (seg–sex 9–18 BRT) — nenhum envio.';
            else if (rep.aborted) note.textContent = '⛔ Abortado por segurança: ' + (rep.error||'');
            else if (dryRun) note.textContent = `Próximo lote (${rep.planned} de ${rep.eligible} elegíveis): ` + (rep.recipients.map(r=>r.name).join(', ') || 'ninguém');
            else note.textContent = `Enviados: ${rep.sent} · falhas: ${rep.failed} · na fila: ${rep.eligible - rep.sent}`;
            if (!dryRun) await refreshProspects();
          } catch (e) { if (e.message!=='unauthorized') note.textContent = 'Erro: '+e.message; }
        };
        simBtn.addEventListener('click', () => runDispatch(true));
        goBtn.addEventListener('click', () => runDispatch(false));
        act.append(srcBtn, simBtn, goBtn);
        p.append(act);
        const note = el('div', 'countnote', 'Disparo automático ativo: seg–sex às 10h, 13h e 16h (BRT) · lote de 8 · máx. 20/dia · template aprovado stevi_parceria_v2.');
        p.append(note);

        // Manual import, tucked away — sourcing is the primary intake now.
        const det = el('details', 'imp');
        det.append(Object.assign(el('summary'), { textContent: '📋 Importar lista manualmente' }));
        const impBox = el('div', 'card'); impBox.style.marginTop = '10px';
        impBox.append(el('div', 'countnote', 'Uma linha por prospect: nome, telefone, cidade, uf, tipo — ex.: "Cooperativa Central, (19) 3822-1234, Campinas, SP, coop".'));
        const ta = el('textarea'); ta.rows = 4;
        ta.style.cssText = 'width:100%;box-sizing:border-box;padding:10px;border-radius:10px;border:1px solid var(--line);font:inherit';
        const impBtn = el('button', 'btn small', 'Importar');
        impBtn.style.marginTop = '8px';
        impBtn.addEventListener('click', async () => {
          if (!ta.value.trim()) return;
          impBtn.disabled = true;
          try {
            const r = await api('prospects', { method:'POST', body: JSON.stringify({ action:'import', text: ta.value }) });
            note.textContent = `Importados: ${r.inserted} novos · ${r.parsed} lidos · ${r.invalid} com telefone inválido.`;
            ta.value = ''; await refreshProspects();
          } catch (e) { if (e.message!=='unauthorized') note.textContent = 'Erro ao importar: '+e.message; }
          finally { impBtn.disabled = false; }
        });
        impBox.append(ta, impBtn);
        det.append(impBox);
        const detWrap = el('div'); detWrap.style.marginBottom = '14px'; detWrap.append(det);
        p.append(detWrap);

        const listWrap = el('div'); listWrap.id = 'prospect-list';
        p.append(listWrap);
        renderProspects();
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    async function refreshProspects() {
      try { pCache = await api('prospects'); renderProspects(); } catch {}
    }

    function renderFunnel() {
      const funnel = $('#p-funnel'); if (!funnel) return;
      funnel.innerHTML = '';
      const stages = Object.keys(P_STATUS);
      stages.forEach((s, i) => {
        const st = P_STATUS[s];
        const n = pCache.filter(x => pStage(x) === s).length;
        const b = el('button', 'fstage' + (pState.status === s ? ' on' : ''));
        b.title = st.hint;
        b.append(el('div', 'n', String(n)), el('div', 'l', st.label));
        const dot = el('span', 'dot'); dot.style.background = st.color; b.append(dot);
        if (i < stages.length - 2) b.append(el('span', 'arr', '›')); // no arrow into "descartados"
        b.addEventListener('click', () => { pState.status = pState.status === s ? null : s; renderProspects(); });
        funnel.append(b);
      });
    }

    function renderProspects() {
      renderFunnel();
      const wrap = $('#prospect-list'); if (!wrap) return;
      wrap.innerHTML = '';

      const order = { replied: 0, contacted: 1, ready: 2, discovered: 3, discarded: 4 };
      let rows = [...pCache].sort((a, b) =>
        (order[pStage(a)] ?? 9) - (order[pStage(b)] ?? 9) ||
        String(b.updated_at || '').localeCompare(String(a.updated_at || '')));
      if (pState.status) rows = rows.filter(x => pStage(x) === pState.status);
      if (pState.kind) rows = rows.filter(x => (x.kind || '') === pState.kind);
      if (pState.q) rows = rows.filter(x => (x.name + ' ' + (x.city||'') + ' ' + (x.phone||'')).toLowerCase().includes(pState.q));

      wrap.append(el('div', 'countnote',
        rows.length === pCache.length ? `${rows.length} prospects` : `${rows.length} de ${pCache.length} prospects (filtro ativo)`));
      if (!rows.length) { wrap.append(el('div', 'empty', 'Nada aqui com esse filtro.')); return; }

      for (const pr of rows) wrap.append(prospectRow(pr));
    }

    function prospectRow(pr) {
      const stage = pStage(pr);
      const st = P_STATUS[stage] || P_STATUS.discovered;
      const item = el('div', 'conv pcard');
      item.style.borderLeftColor = st.color;

      const left = el('div');
      const who = el('div', 'who');
      who.append(el('span', null, pr.name));
      const spill = el('span', 'spill', st.pill); spill.style.background = st.color;
      who.append(spill);
      if (pr.agent_enabled === false) {
        const off = el('span', 'spill', '🤖 agente off'); off.style.background = 'var(--amber)'; who.append(off);
      }
      left.append(who);
      const meta = el('div', 'meta');
      [pr.kind, pr.city, pr.uf].filter(Boolean).forEach(v => meta.append(Object.assign(el('span','pill'),{textContent:v})));
      meta.append(document.createTextNode(pr.phone ? pr.phone : '(sem número)'));
      if (pr.wa_status === 'invalid') meta.append(Object.assign(el('span','pill'),{textContent:'nº inválido'}));
      if (pr.send_status === 'send_failed') meta.append(Object.assign(el('span','pill'),{textContent:'⚠️ envio falhou'}));
      left.append(meta);
      if (pr.qualification && Object.values(pr.qualification).some(v => v != null)) {
        const qd = pr.qualification, bits = [];
        if (qd.accepts_leads != null) bits.push(qd.accepts_leads ? '✅ aceita leads' : '❌ não aceita leads');
        if (qd.response_time) bits.push('⏱ ' + qd.response_time);
        if (qd.format_pref) bits.push('💰 ' + qd.format_pref);
        if (qd.coverage && qd.coverage.length) bits.push('📍 ' + qd.coverage.join(', '));
        if (qd.crops && qd.crops.length) bits.push('🌱 ' + qd.crops.join(', '));
        if (bits.length) left.append(el('div', 'quali', bits.join(' · ')));
      }

      const right = el('div', 'act');
      const setStatus = async (status, btn) => {
        btn.disabled = true;
        try {
          await api('prospects', { method:'POST', body: JSON.stringify({ action:'status', id: pr.id, status }) });
          pr.status = status;
          if (status === 'ready' && pr.wa_status === 'pending') pr.wa_status = 'valid';
          renderProspects();
        } catch (e) { if (e.message!=='unauthorized') alert('Não deu pra salvar.'); btn.disabled = false; }
      };
      if (stage === 'discovered') {
        const ok = el('button', 'btn tiny', '✓ Aprovar');
        if (!pr.phone || pr.wa_status === 'invalid') { ok.disabled = true; ok.title = 'Sem número válido'; }
        ok.addEventListener('click', () => setStatus('ready', ok));
        const no = el('button', 'btn tiny danger', '✕');
        no.title = 'Descartar';
        no.addEventListener('click', () => setStatus('discarded', no));
        right.append(ok, no);
      } else if (stage === 'ready') {
        const back = el('button', 'btn tiny danger', '✕ Tirar da fila');
        back.addEventListener('click', () => setStatus('discovered', back));
        right.append(back);
      } else if (stage === 'discarded') {
        const back = el('button', 'btn tiny danger', '↩ Reativar');
        back.addEventListener('click', () => setStatus('discovered', back));
        right.append(back);
      }
      if (stage === 'replied' || stage === 'contacted' || pr.send_status) {
        const chatBtn = el('button', 'btn tiny' + (stage === 'replied' ? '' : ' ghost'), '💬 Conversa');
        chatBtn.addEventListener('click', () => toggleProspectThread(item, pr));
        right.append(chatBtn);
      }

      item.append(left, right);
      return item;
    }

    async function toggleProspectThread(item, pr) {
      let box = item.nextElementSibling;
      if (box && box.classList.contains('prospect-thread')) { box.remove(); return; }
      box = el('div', 'card prospect-thread');
      box.style.cssText = 'margin:4px 0 12px 20px;padding:14px';
      box.append(el('div', 'loading', 'Carregando conversa…'));
      item.after(box);
      try {
        const thread = await api('prospects', { method:'POST', body: JSON.stringify({ action:'thread', id: pr.id }) });
        box.innerHTML = '';
        const hd = el('div', 'toolbar');
        hd.append(el('b', null, 'Vitória 🤖 ↔ ' + pr.name));
        const tg = el('button', 'btn tiny ghost', pr.agent_enabled === false ? '▶️ Religar agente' : '⏸ Assumir conversa');
        tg.addEventListener('click', async () => {
          const enable = pr.agent_enabled === false;
          try {
            await api('prospects', { method:'POST', body: JSON.stringify({ action:'agent', id: pr.id, enabled: enable }) });
            pr.agent_enabled = enable;
            tg.textContent = enable ? '⏸ Assumir conversa' : '▶️ Religar agente';
            renderFunnel();
          } catch (e) { if (e.message!=='unauthorized') alert('Não deu pra salvar.'); }
        });
        hd.append(tg);
        box.append(hd);
        if (!thread.length) box.append(el('div','empty','Sem mensagens ainda — o primeiro contato foi o template aprovado.'));
        else {
          const tw = el('div', 'thread');
          for (const m of thread) {
            const b = el('div', 'msg ' + (m.direction === 'out' ? 'out' : 'in'), m.text ?? '('+m.kind+')');
            b.append(el('span', 'tag', [m.kind !== 'text' ? m.kind : null, m.direction === 'out' ? 'Vitória' : pr.name, fmtDate(m.created_at)].filter(Boolean).join(' · ')));
            tw.append(b);
          }
          box.append(tw);
        }
      } catch (e) {
        if (e.message!=='unauthorized') box.innerHTML = '<div class="empty">Erro: '+e.message+'</div>';
      }
    }

    async function loadVoz() {
      const p = $('#p-voz'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const packs = await api('voice?body=1');
        p.innerHTML = '';
        p.append(el('p', 'meta', 'A voz da Stevi é uma camada versionada, trocável sem deploy. Ativar aplica em ~3 min.'));
        if (!packs.length) { p.append(el('div', 'empty', 'Nenhum style pack ainda.')); return; }
        for (const pk of packs) {
          const card = el('div', 'pack');
          const hd = el('div', 'hd');
          const left = el('div');
          left.append(Object.assign(el('span'), {innerHTML: '<b class="serif" style="font-size:20px;color:var(--green)">v'+pk.version+'</b> <span class="badge '+(pk.active?'on':'off')+'">'+(pk.active?'ATIVA':'inativa')+'</span> <span class="meta">'+pk.chars+' caracteres · '+fmtDate(pk.createdAt)+'</span>'}));
          hd.append(left);
          if (!pk.active) { const b = el('button','btn small','Ativar'); b.addEventListener('click', ()=>activate(pk.version)); hd.append(b); }
          card.append(hd);
          if (pk.notes) card.append(el('p','notes', pk.notes));
          if (pk.body) { const det = el('details'); det.append(Object.assign(el('summary'),{textContent:'Ver conteúdo'})); const pre = el('pre'); pre.textContent = pk.body; det.append(pre); card.append(det); }
          p.append(card);
        }
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }
    async function activate(version) {
      if (!confirm('Ativar a voz v'+version+' em produção?')) return;
      try { await api('voice', { method:'POST', body: JSON.stringify({version}) }); loadVoz(); }
      catch (e) { alert('Erro: '+e.message); }
    }

    async function loadDigests() {
      const p = $('#p-digests'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const rows = await api('digests');
        p.innerHTML = '';
        p.append(el('div', 'countnote', 'Resumo automático do dia (gerado às 18h BRT): quem chegou, o que perguntaram, onde a Stevi travou.'));
        if (!rows.length) { p.innerHTML = '<div class="empty">Nenhum resumo diário ainda.</div>'; return; }
        for (const d of rows) {
          const card = el('div', 'card digest');
          card.append(el('div', 'when', fmtDate(d.ranAt)));
          const pre = el('pre'); pre.textContent = d.text || '(sem texto)'; card.append(pre);
          p.append(card);
        }
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    function scoreChip(label, v) {
      const s = el('span', 'spill', label + ' ' + (v ?? '—') + '/5');
      s.style.background = v >= 4 ? '#2e9e63' : v >= 3 ? '#b7791f' : '#b23b3b';
      return s;
    }

    function renderVitoriaGym(p, vit) {
      const intro = el('div', 'card');
      intro.append(el('h3', null, '🤖 Treino da Vitória (prospecção)'));
      intro.append(el('div', 'countnote',
        'Personagens simulados (gerente ocupado, cético de preço, detector de bot…) conversam com o cérebro REAL da Vitória. ' +
        'Um juiz dá notas de 1 a 5 em: naturalidade (parece gente), missão (avança a qualificação) e segurança (nunca fala preço, escala pro Stefano). ' +
        'Rodar: npm run gym:vitoria'));
      const pw = el('div');
      (vit.personas || []).forEach(pe => pw.append(Object.assign(el('span','pill'), {textContent: pe.label})));
      intro.append(pw);
      p.append(intro);

      if (!(vit.runs || []).length) {
        p.append(el('div', 'empty', 'Nenhum treino da Vitória ainda.'));
        return;
      }
      for (const r of vit.runs) {
        const card = el('div', 'card');
        card.append(el('div', 'when', fmtDate(r.ran_at)));
        const hd = el('div', 'toolbar');
        hd.append(scoreChip('naturalidade', r.medias?.naturalidade), scoreChip('missão', r.medias?.missao), scoreChip('segurança', r.medias?.seguranca));
        card.append(hd);
        for (const v of (r.verdicts || [])) {
          const det = el('details');
          const sum = el('summary');
          sum.style.cursor = 'pointer';
          const segBad = v.scores?.seguranca > 0 && v.scores.seguranca < 3;
          sum.textContent = (segBad ? '⚠️ ' : '') + v.label + ' — nat ' + v.scores?.naturalidade + ' · missão ' + v.scores?.missao + ' · seg ' + v.scores?.seguranca;
          det.append(sum);
          if (v.veredicto) det.append(el('div', 'quali', v.veredicto));
          const tw = el('div', 'thread'); tw.style.marginTop = '8px';
          for (const t of (v.transcript || [])) {
            const b = el('div', 'msg ' + (t.role === 'vitoria' ? 'out' : 'in'), t.text);
            b.append(el('span', 'tag', t.role === 'vitoria' ? 'Vitória' : v.label));
            tw.append(b);
          }
          det.append(tw);
          card.append(det);
        }
        p.append(card);
      }
    }

    async function loadGym() {
      const p = $('#p-gym'); p.innerHTML = '<div class="loading">Carregando…</div>';
      try {
        const d = await api('gym');
        p.innerHTML = '';
        if (d.vitoria) renderVitoriaGym(p, d.vitoria);
        const intro = el('div', 'card');
        intro.append(el('h3', null, 'Treino da voz (Gym)'));
        intro.append(Object.assign(el('p','meta'), {textContent: 'Produtores simulados conversam com o cérebro real da Stevi; um juiz de 3 lentes (naturalidade · clareza · segurança, com veto de segurança) compara a voz campeã contra uma desafiante. Rodar uma rodada: '}));
        intro.append(Object.assign(el('code','mono'), {textContent: 'npm run gym -- <campeã> <desafiante>'}));
        p.append(intro);

        const pc = el('div', 'card');
        pc.append(el('h3', null, 'Personas (' + d.personas.length + ')'));
        const wrap = el('div');
        d.personas.forEach(pe => { const s = el('span','pill'); s.textContent = pe.label + (pe.crop?(' · '+pe.crop):''); wrap.append(s); });
        pc.append(wrap); p.append(pc);

        if (!d.runs.length) { p.append(el('div','empty','Nenhuma rodada ainda. Rode `npm run gym -- 1 2` para começar.')); return; }
        for (const r of d.runs) {
          const card = el('div', 'card');
          card.append(el('div','when', fmtDate(r.ran_at)));
          card.append(Object.assign(el('div'), {innerHTML: '<b class="serif" style="font-size:19px;color:var(--green)">v'+r.champion+' vs v'+r.challenger+'</b> &nbsp; campeã '+(r.tally.A||0)+' · desafiante '+(r.tally.B||0)+' · empate '+(r.tally.tie||0)}));
          card.append(Object.assign(el('div','notes'), {textContent: '→ recomendado: v'+r.recommended+' — '+(r.reason||'')}));
          if (Array.isArray(r.verdicts) && r.verdicts.length) {
            const det = el('details'); det.append(Object.assign(el('summary'),{textContent:'Ver veredictos por persona'}));
            const ul = el('div');
            r.verdicts.forEach(v => { const line = el('div','meta'); const w = v.winner==='A'?'campeã':v.winner==='B'?'DESAFIANTE':'empate'; const flag = v.safety&&(v.safety.A||v.safety.B)?' ⚠️ violação de segurança':''; line.textContent = '• '+v.persona+': '+w+flag; ul.append(line); });
            det.append(ul); card.append(det);
          }
          p.append(card);
        }
      } catch (e) { if (e.message!=='unauthorized') p.innerHTML = '<div class="empty">Erro: '+e.message+'</div>'; }
    }

    // Probe session: if overview loads, we're in; else show login.
    (async () => {
      try { await api('overview'); showApp(); }
      catch { showLogin(); }
    })();
  </script>
</body>
</html>
